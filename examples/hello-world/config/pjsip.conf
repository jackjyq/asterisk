; Transport configuration - UDP on all interfaces
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

; SIP peer configuration for extension 6001
[6001]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
auth=6001
aors=6001
transport=transport-udp
media_address=192.168.10.10
direct_media=no

; Authentication for peer 6001
[6001]
type=auth
auth_type=userpass
password=unsecurepassword
username=6001

; Address of Record (AOR) for peer 6001
[6001]
type=aor
max_contacts=1

; SIP peer configuration for extension 6002
[6002]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
auth=6002
aors=6002
transport=transport-udp
media_address=192.168.10.10
direct_media=no

; Authentication for peer 6002
[6002]
type=auth
auth_type=userpass
password=unsecurepassword
username=6002

; Address of Record (AOR) for peer 6002
[6002]
type=aor
max_contacts=1
